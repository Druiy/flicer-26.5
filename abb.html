<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>版本更新</title>
    <style>
        :root {
            --theme: #10B981;
            --theme-glow: rgba(16, 185, 129, 0.25);
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-bg-hover: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-border-hover: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 2px 16px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(255, 255, 255, 0.12) inset, 0 1px 0 rgba(255, 255, 255, 0.35) inset;
            --radius: 20px;
            --radius-sm: 14px;
            --transition: 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            --blur-amount: 22px;
            --saturate-amount: 160%;
            --text-primary: #1a1a1a;
            --text-secondary: #5c544a;
            --bg-blur: 0px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: linear-gradient(155deg, #ece7df 0%, #f4f0ea 20%, #efeae3 45%, #f7f3ed 70%, #e8e3da 100%);
            background-attachment: fixed;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
            padding: 20px;
            user-select: none;
        }

        /* 背景层（用于显示自定义背景和模糊） */
        .bg-blur-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(var(--bg-blur));
            transition: filter 0.3s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 70vw;
            height: 70vw;
            max-width: 600px;
            max-height: 600px;
            background: radial-gradient(circle at 40% 35%, var(--theme-glow) 0%, transparent 72%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: ambientGlow1 12s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -25%;
            right: -18%;
            width: 60vw;
            height: 60vw;
            max-width: 500px;
            max-height: 500px;
            background: radial-gradient(circle at 55% 60%, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: ambientGlow2 14s ease-in-out infinite;
        }
        @keyframes ambientGlow1 {
            0%,100% { transform: translate(0,0) scale(1); opacity:0.6; }
            33% { transform: translate(60px,-40px) scale(1.2); opacity:0.85; }
            66% { transform: translate(-30px,30px) scale(0.85); opacity:0.45; }
        }
        @keyframes ambientGlow2 {
            0%,100% { transform: translate(0,0) scale(1); opacity:0.4; }
            40% { transform: translate(-50px,35px) scale(1.25); opacity:0.7; }
            75% { transform: translate(30px,-25px) scale(0.8); opacity:0.3; }
        }

        .update-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount)) saturate(var(--saturate-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(var(--saturate-amount));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 40px 28px 32px;
            box-shadow: var(--glass-shadow);
            text-align: center;
            position: relative;
            z-index: 2;
            animation: fadeUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(16px);
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .update-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 32px;
            letter-spacing: -0.02em;
            text-shadow: 0 1px 3px rgba(255,255,255,0.4);
        }

        .content-wrap {
            position: relative;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .update-line {
            position: absolute;
            width: 100%;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
            text-align: center;
            line-height: 1.8;
            padding: 0 8px;
            opacity: 0;
            transform: translateY(16px);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
            pointer-events: none;
        }
        .update-line.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 20px 0 24px;
        }
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            border: 1px solid rgba(255,255,255,0.4);
            transition: all 0.4s ease;
        }
        .progress-dot.active {
            background: var(--theme);
            border-color: var(--theme);
            box-shadow: 0 0 10px var(--theme-glow);
            transform: scale(1.3);
        }
        .progress-dot.done {
            background: rgba(16,185,129,0.4);
            border-color: rgba(16,185,129,0.5);
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
        }

        .nav-btn {
            padding: 10px 24px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--glass-shadow);
            letter-spacing: 0.02em;
            outline: none;
            min-width: 100px;
        }
        .nav-btn:hover:not(:disabled) {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
        }
        .nav-btn:active:not(:disabled) {
            transform: scale(0.95);
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .click-tip {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.03em;
            opacity: 0.7;
            margin-top: 16px;
        }

        @media (max-width: 440px) {
            .update-card {
                padding: 30px 18px 24px;
                border-radius: var(--radius-sm);
            }
            .update-title {
                font-size: 1.3rem;
                margin-bottom: 24px;
            }
            .update-line {
                font-size: 0.9rem;
            }
            .content-wrap {
                min-height: 100px;
            }
        }

        /* 浅色文字模式 */
        .body-text-light {
            --text-primary: #f0f0f0;
            --text-secondary: #c0b8b0;
        }
    </style>
</head>
<body>
    <!-- 背景层（同步主页背景） -->
    <div class="bg-blur-layer" id="bgBlurLayer"></div>

    <div class="update-card" id="updateCard">
        <h2 class="update-title">Ver26.5更新内容</h2>

        <div class="content-wrap">
            <div class="update-line show">1. 统一了各个二级页面的材质，统一由设置进行修改</div>
            <div class="update-line">2. 新增自定义玻璃调节功能，可按需调节玻璃透明度与玻璃模糊度，优化调节滑块，默认隐藏至下拉栏，防止误触</div>
            <div class="update-line">3. 新增自定义主题背景功能，同时也提供三种内置渐变调色背景,并且可以进行模糊度调节</div>
            <div class="update-line">4. 本次版本新增两项工具①LateX公式预览②颜色选择器</div>
        </div>

        <div class="progress-dots" id="progressDots">
            <span class="progress-dot active"></span>
            <span class="progress-dot"></span>
            <span class="progress-dot"></span>
            <span class="progress-dot"></span>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" disabled>◀ 上一条</button>
            <button class="nav-btn" id="nextBtn">下一条 ▶</button>
        </div>

        <p class="click-tip" id="clickTip">点击按钮或页面空白处切换内容</p>
    </div>

    <script>
        const lines = document.querySelectorAll('.update-line');
        const dots = document.querySelectorAll('.progress-dot');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const total = lines.length;
        let now = 0;

        function updateButtons() {
            prevBtn.disabled = (now === 0);
            nextBtn.disabled = (now === total - 1);
        }

        function goToPage(index) {
            if (index === now || index < 0 || index >= total) return;

            lines[now].classList.remove('show');
            dots[now].classList.remove('active');

            if (index > now) {
                for (let i = now; i < index; i++) {
                    dots[i].classList.add('done');
                }
            } else {
                for (let i = index + 1; i <= now; i++) {
                    dots[i].classList.remove('done');
                    dots[i].classList.remove('active');
                }
            }

            now = index;
            lines[now].classList.add('show');
            dots[now].classList.add('active');

            updateButtons();
        }

        function nextPage() {
            if (now < total - 1) goToPage(now + 1);
        }

        function prevPage() {
            if (now > 0) goToPage(now - 1);
        }

        prevBtn.addEventListener('click', prevPage);
        nextBtn.addEventListener('click', nextPage);

        document.body.addEventListener('click', function(e) {
            if (e.target.closest('.nav-btn')) return;
            if (!e.target.closest('.update-card')) return;
            if (now < total - 1) nextPage();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') { e.preventDefault(); nextPage(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
        });

        updateButtons();

        // ========== 同步主页全部样式设置 ==========
        const bgBlurLayer = document.getElementById('bgBlurLayer');

        const bgPresets = {
            default: 'linear-gradient(155deg, #ece7df 0%, #f4f0ea 20%, #efeae3 45%, #f7f3ed 70%, #e8e3da 100%)',
            sunrise: 'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
            ocean: 'linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%)',
            lavender: 'linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%)'
        };

        function applySharedSettings() {
            // 1. 主题色
            const themeColor = localStorage.getItem('themeColor') || '#10B981';
            const rgb = hexToRgb(themeColor);
            const glowRgba = `rgba(${rgb.r},${rgb.g},${rgb.b},0.25)`;
            document.documentElement.style.setProperty('--theme', themeColor);
            document.documentElement.style.setProperty('--theme-glow', glowRgba);

            // 2. 玻璃透明度
            const glassOpacity = parseFloat(localStorage.getItem('glassOpacity')) || 10;
            const opacityValue = glassOpacity / 100;
            document.documentElement.style.setProperty('--glass-bg', `rgba(255, 255, 255, ${opacityValue})`);
            document.documentElement.style.setProperty('--glass-bg-hover', `rgba(255, 255, 255, ${opacityValue + 0.12})`);

            // 3. 毛玻璃模糊强度
            const blurAmount = localStorage.getItem('blurAmount') || '22';
            document.documentElement.style.setProperty('--blur-amount', blurAmount + 'px');

            // 4. 背景模糊
            const bgBlurAmount = localStorage.getItem('bgBlurAmount') || '0';
            document.documentElement.style.setProperty('--bg-blur', bgBlurAmount + 'px');

            // 5. 背景图像
            const bgType = localStorage.getItem('customBgType') || 'default';
            const bgValue = localStorage.getItem('customBgValue') || 'default';
            if (bgType === 'image' && bgValue) {
                bgBlurLayer.style.backgroundImage = `url(${bgValue})`;
                bgBlurLayer.style.backgroundSize = 'cover';
                bgBlurLayer.style.backgroundPosition = 'center';
                bgBlurLayer.style.backgroundAttachment = 'fixed';
                document.body.style.background = '';
            } else if (bgType === 'preset' && bgPresets[bgValue]) {
                bgBlurLayer.style.backgroundImage = bgPresets[bgValue];
                bgBlurLayer.style.backgroundSize = 'cover';
                bgBlurLayer.style.backgroundPosition = 'center';
                bgBlurLayer.style.backgroundAttachment = 'fixed';
                document.body.style.background = '';
            } else {
                bgBlurLayer.style.backgroundImage = bgPresets['default'];
                bgBlurLayer.style.backgroundSize = 'cover';
                bgBlurLayer.style.backgroundPosition = 'center';
                bgBlurLayer.style.backgroundAttachment = 'fixed';
                document.body.style.background = '';
            }

            // 6. 字体颜色
            applyTextColor();
        }

        function applyTextColor() {
            const textColorMode = localStorage.getItem('textColorMode') || 'auto';
            const customTextColor = localStorage.getItem('customTextColor');
            const body = document.body;
            body.classList.remove('body-text-light');

            if (customTextColor) {
                document.documentElement.style.setProperty('--text-primary', customTextColor);
                document.documentElement.style.setProperty('--text-secondary', customTextColor);
            } else if (textColorMode === 'light') {
                body.classList.add('body-text-light');
            } else if (textColorMode === 'auto') {
                const isDarkBg = localStorage.getItem('customBgIsDark') === '1';
                if (isDarkBg) {
                    body.classList.add('body-text-light');
                } else {
                    document.documentElement.style.setProperty('--text-primary', '#1a1a1a');
                    document.documentElement.style.setProperty('--text-secondary', '#5c544a');
                }
            } else {
                document.documentElement.style.setProperty('--text-primary', '#1a1a1a');
                document.documentElement.style.setProperty('--text-secondary', '#5c544a');
            }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 16, g: 185, b: 129 };
        }

        applySharedSettings();
    </script>
</body>
</html>
