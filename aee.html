<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>颜色选择器</title>
    <style>
        :root {
            --theme: #10B981;
            --theme-glow: rgba(16, 185, 129, 0.25);
            --glass-bg: rgba(255, 255, 255, 0.10);
            --glass-bg-hover: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.28);
            --glass-border-hover: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 2px 16px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(255, 255, 255, 0.12) inset, 0 1px 0 rgba(255, 255, 255, 0.35) inset;
            --radius: 18px;
            --radius-sm: 14px;
            --transition: 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            --blur-amount: 20px;
            --saturate-amount: 150%;
            --text-primary: #1a1a1a;
            --text-secondary: #5c544a;
            --text-muted: #9a9085;
            --bg-blur: 0px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: linear-gradient(155deg, #ece7df 0%, #f4f0ea 20%, #efeae3 45%, #f7f3ed 70%, #e8e3da 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
        }

        /* 背景层（同步主页背景） */
        .bg-blur-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(var(--bg-blur));
            transition: filter 0.3s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%; left: -20%;
            width: 70vw; height: 70vw;
            background: radial-gradient(circle at 40% 35%, var(--theme-glow) 0%, transparent 72%);
            border-radius: 50%; pointer-events: none; z-index: 0;
            animation: ambientGlow1 12s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -25%; right: -18%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle at 55% 60%, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 0;
            animation: ambientGlow2 14s ease-in-out infinite;
        }
        @keyframes ambientGlow1 {
            0%,100% { transform: translate(0,0) scale(1); opacity:0.6; }
            33% { transform: translate(60px,-40px) scale(1.2); opacity:0.85; }
            66% { transform: translate(-30px,30px) scale(0.85); opacity:0.45; }
        }
        @keyframes ambientGlow2 {
            0%,100% { transform: translate(0,0) scale(1); opacity:0.4; }
            40% { transform: translate(-50px,35px) scale(1.25); opacity:0.7; }
            75% { transform: translate(30px,-25px) scale(0.8); opacity:0.3; }
        }

        /* 主卡片 */
        .container {
            width: 100%;
            max-width: 440px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount)) saturate(var(--saturate-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(var(--saturate-amount));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 32px 24px;
            box-shadow: var(--glass-shadow);
            position: relative;
            z-index: 2;
            animation: fadeUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(16px);
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        h2 {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
            letter-spacing: -0.02em;
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.4);
        }

        /* 大色块预览 */
        .color-preview {
            width: 100%;
            height: 120px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--glass-shadow);
            border: 2px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .color-preview:hover {
            transform: scale(1.02);
            border-color: var(--glass-border-hover);
            box-shadow: 0 10px 34px rgba(0,0,0,0.07), 0 0 0 1px rgba(255,255,255,0.25) inset;
        }
        .color-preview:active { transform: scale(0.98); }
        .color-preview .click-hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(8px);
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            pointer-events: none;
            letter-spacing: 0.02em;
        }

        /* 隐藏的原生颜色选择器 */
        #colorPicker {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }

        /* 信息行 */
        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .info-label {
            width: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.02em;
            flex-shrink: 0;
        }
        .info-value {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
            font-family: 'SF Mono', 'Fira Code', monospace;
            letter-spacing: 0.03em;
            text-align: center;
            transition: all var(--transition);
            outline: none;
            border: 1px solid var(--glass-border);
            user-select: all;
        }
        .info-value:focus {
            border-color: var(--glass-border-hover);
            box-shadow: 0 0 0 4px var(--theme-glow);
            background: rgba(255, 255, 255, 0.15);
        }
        .copy-btn {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--glass-shadow);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .copy-btn:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            color: var(--text-primary);
        }
        .copy-btn:active { transform: scale(0.94); }
        .copy-btn.copied {
            background: var(--theme);
            color: #fff;
            border-color: var(--theme);
        }

        /* 预设颜色 */
        .preset-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
            margin-top: 20px;
        }
        .preset-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .preset-dot {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            transition: all var(--transition);
            border: 2.5px solid var(--glass-border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: relative;
        }
        .preset-dot:hover {
            transform: scale(1.15);
            border-color: #fff;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .preset-dot:active { transform: scale(0.9); }
        .preset-dot.active {
            border-color: #fff;
            box-shadow: 0 0 0 5px rgba(255,255,255,0.35);
        }

        @media (max-width: 440px) {
            .container { padding: 24px 16px; }
            .color-preview { height: 100px; }
            .info-label { width: 40px; font-size: 0.78rem; }
            .info-value { font-size: 0.82rem; padding: 8px 10px; }
            .copy-btn { padding: 8px 10px; font-size: 0.72rem; }
            .preset-dot { width: 32px; height: 32px; }
        }

        /* 浅色文字模式 */
        .body-text-light {
            --text-primary: #f0f0f0;
            --text-secondary: #c0b8b0;
            --text-muted: #a0988d;
        }
    </style>
</head>
<body>
    <!-- 背景层（同步主页背景） -->
    <div class="bg-blur-layer" id="bgBlurLayer"></div>

    <div class="container">
        <h2>颜色选择器</h2>

        <!-- 大色块预览 -->
        <div class="color-preview" id="colorPreview" onclick="openColorPicker()">
            <div class="click-hint">点击选取颜色</div>
        </div>

        <!-- 隐藏的原生色盘 -->
        <input type="color" id="colorPicker" value="#10B981" onchange="onColorChange(this.value)">

        <!-- HEX -->
        <div class="info-row">
            <span class="info-label">HEX</span>
            <input type="text" class="info-value" id="hexValue" value="#10B981" onchange="onHexInput(this.value)" spellcheck="false">
            <button class="copy-btn" onclick="copyValue('hex')">复制</button>
        </div>

        <!-- RGB -->
        <div class="info-row">
            <span class="info-label">RGB</span>
            <span class="info-value" id="rgbValue">rgb(16, 185, 129)</span>
            <button class="copy-btn" onclick="copyValue('rgb')">复制</button>
        </div>

        <!-- HSL -->
        <div class="info-row">
            <span class="info-label">HSL</span>
            <span class="info-value" id="hslValue">hsl(160, 84%, 39%)</span>
            <button class="copy-btn" onclick="copyValue('hsl')">复制</button>
        </div>

        <!-- 预设颜色 -->
        <p class="preset-label">预设颜色</p>
        <div class="preset-row" id="presetRow">
            <span class="preset-dot active" style="background:#10B981" data-color="#10B981" onclick="selectPreset('#10B981', this)"></span>
            <span class="preset-dot" style="background:#EF4444" data-color="#EF4444" onclick="selectPreset('#EF4444', this)"></span>
            <span class="preset-dot" style="background:#3B82F6" data-color="#3B82F6" onclick="selectPreset('#3B82F6', this)"></span>
            <span class="preset-dot" style="background:#F59E0B" data-color="#F59E0B" onclick="selectPreset('#F59E0B', this)"></span>
            <span class="preset-dot" style="background:#8B5CF6" data-color="#8B5CF6" onclick="selectPreset('#8B5CF6', this)"></span>
            <span class="preset-dot" style="background:#EC4899" data-color="#EC4899" onclick="selectPreset('#EC4899', this)"></span>
            <span class="preset-dot" style="background:#000000" data-color="#000000" onclick="selectPreset('#000000', this)"></span>
            <span class="preset-dot" style="background:#FFFFFF" data-color="#FFFFFF" onclick="selectPreset('#FFFFFF', this)"></span>
        </div>
    </div>

    <script>
        const colorPicker = document.getElementById('colorPicker');
        const colorPreview = document.getElementById('colorPreview');
        const hexInput = document.getElementById('hexValue');
        const rgbDisplay = document.getElementById('rgbValue');
        const hslDisplay = document.getElementById('hslValue');

        function openColorPicker() {
            colorPicker.click();
        }

        function onColorChange(hex) {
            updateAllDisplays(hex);
        }

        function onHexInput(value) {
            // 规范化输入
            let hex = value.trim();
            if (!hex.startsWith('#')) hex = '#' + hex;
            // 验证 HEX 格式
            if (/^#[0-9a-fA-F]{6}$/.test(hex) || /^#[0-9a-fA-F]{3}$/.test(hex)) {
                if (hex.length === 4) {
                    hex = '#' + hex[1]+hex[1] + hex[2]+hex[2] + hex[3]+hex[3];
                }
                hex = hex.toUpperCase();
                colorPicker.value = hex;
                hexInput.value = hex;
                updateAllDisplays(hex);
            }
        }

        function updateAllDisplays(hex) {
            hex = hex.toUpperCase();
            colorPreview.style.backgroundColor = hex;
            hexInput.value = hex;
            colorPicker.value = hex;

            const rgb = hexToRgb(hex);
            rgbDisplay.textContent = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;

            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
            hslDisplay.textContent = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;

            // 更新预设选中状态
            document.querySelectorAll('.preset-dot').forEach(dot => {
                dot.classList.remove('active');
                if (dot.dataset.color.toUpperCase() === hex) dot.classList.add('active');
            });
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 16, g: 185, b: 129 };
        }

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                l: Math.round(l * 100)
            };
        }

        function selectPreset(hex, el) {
            hex = hex.toUpperCase();
            colorPicker.value = hex;
            hexInput.value = hex;
            updateAllDisplays(hex);
            document.querySelectorAll('.preset-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function copyValue(type) {
            let text = '';
            switch (type) {
                case 'hex': text = hexInput.value; break;
                case 'rgb': text = rgbDisplay.textContent; break;
                case 'hsl': text = hslDisplay.textContent; break;
            }
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target.closest('.copy-btn');
                btn.classList.add('copied');
                const orig = btn.textContent;
                btn.textContent = '✓';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.textContent = orig;
                }, 1200);
            }).catch(() => {
                // 降级方案
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed'; ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                const btn = event.target.closest('.copy-btn');
                btn.classList.add('copied');
                const orig = btn.textContent;
                btn.textContent = '✓';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.textContent = orig;
                }, 1200);
            });
        }

        // 初始显示
        updateAllDisplays('#10B981');

        // ========== 同步主页全部样式设置 ==========
        const bgBlurLayer = document.getElementById('bgBlurLayer');
        const bgPresets = {
            default: 'linear-gradient(155deg, #ece7df 0%, #f4f0ea 20%, #efeae3 45%, #f7f3ed 70%, #e8e3da 100%)',
            sunrise: 'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
            ocean: 'linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%)',
            lavender: 'linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%)'
        };

        function applySharedSettings() {
            const themeColor = localStorage.getItem('themeColor') || '#10B981';
            const rgb = hexToRgb(themeColor);
            document.documentElement.style.setProperty('--theme', themeColor);
            document.documentElement.style.setProperty('--theme-glow', `rgba(${rgb.r},${rgb.g},${rgb.b},0.25)`);

            const glassOpacity = parseFloat(localStorage.getItem('glassOpacity')) || 10;
            const opacityValue = glassOpacity / 100;
            document.documentElement.style.setProperty('--glass-bg', `rgba(255, 255, 255, ${opacityValue})`);
            document.documentElement.style.setProperty('--glass-bg-hover', `rgba(255, 255, 255, ${opacityValue + 0.12})`);

            const blurAmount = localStorage.getItem('blurAmount') || '20';
            document.documentElement.style.setProperty('--blur-amount', blurAmount + 'px');

            const bgBlurAmount = localStorage.getItem('bgBlurAmount') || '0';
            document.documentElement.style.setProperty('--bg-blur', bgBlurAmount + 'px');

            const bgType = localStorage.getItem('customBgType') || 'default';
            const bgValue = localStorage.getItem('customBgValue') || 'default';
            if (bgType === 'image' && bgValue) {
                bgBlurLayer.style.backgroundImage = `url(${bgValue})`;
            } else if (bgType === 'preset' && bgPresets[bgValue]) {
                bgBlurLayer.style.backgroundImage = bgPresets[bgValue];
            } else {
                bgBlurLayer.style.backgroundImage = bgPresets['default'];
            }
            bgBlurLayer.style.backgroundSize = 'cover';
            bgBlurLayer.style.backgroundPosition = 'center';
            bgBlurLayer.style.backgroundAttachment = 'fixed';
            document.body.style.background = '';

            applyTextColor();
        }

        function applyTextColor() {
            const textColorMode = localStorage.getItem('textColorMode') || 'auto';
            const customTextColor = localStorage.getItem('customTextColor');
            const body = document.body;
            body.classList.remove('body-text-light');
            if (customTextColor) {
                document.documentElement.style.setProperty('--text-primary', customTextColor);
                document.documentElement.style.setProperty('--text-secondary', customTextColor);
                document.documentElement.style.setProperty('--text-muted', customTextColor);
            } else if (textColorMode === 'light') {
                body.classList.add('body-text-light');
            } else if (textColorMode === 'auto') {
                if (localStorage.getItem('customBgIsDark') === '1') body.classList.add('body-text-light');
            }
        }

        applySharedSettings();
    </script>
</body>
</html>
