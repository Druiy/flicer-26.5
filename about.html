<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>关于 Flicer</title>
    <style>
        :root {
            --theme: #10B981;
            --theme-glow: rgba(16, 185, 129, 0.25);
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-bg-hover: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 2px 16px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(255, 255, 255, 0.12) inset, 0 1px 0 rgba(255, 255, 255, 0.35) inset;
            --radius: 20px;
            --radius-sm: 14px;
            --transition: 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            --blur-amount: 22px;
            --saturate-amount: 160%;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --bg-blur: 0px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: linear-gradient(155deg, #ece7df 0%, #f4f0ea 20%, #efeae3 45%, #f7f3ed 70%, #e8e3da 100%);
            background-attachment: fixed;
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text-primary);
            line-height: 1.8;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景层（用于显示自定义背景和模糊） */
        .bg-blur-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(var(--bg-blur));
            transition: filter 0.3s ease;
        }

        /* 动态光斑背景 */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 70vw;
            height: 70vw;
            max-width: 600px;
            max-height: 600px;
            background: radial-gradient(circle at 40% 35%, var(--theme-glow) 0%, transparent 72%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: ambientGlow1 12s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -25%;
            right: -18%;
            width: 60vw;
            height: 60vw;
            max-width: 500px;
            max-height: 500px;
            background: radial-gradient(circle at 55% 60%, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: ambientGlow2 14s ease-in-out infinite;
        }
        @keyframes ambientGlow1 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.6;
            }
            33% {
                transform: translate(60px, -40px) scale(1.2);
                opacity: 0.85;
            }
            66% {
                transform: translate(-30px, 30px) scale(0.85);
                opacity: 0.45;
            }
        }
        @keyframes ambientGlow2 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.4;
            }
            40% {
                transform: translate(-50px, 35px) scale(1.25);
                opacity: 0.7;
            }
            75% {
                transform: translate(30px, -25px) scale(0.8);
                opacity: 0.3;
            }
        }

        /* 全局丝滑渐入动画 */
        @keyframes smoothFadeUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            opacity: 0;
            animation: smoothFadeUp 0.8s ease-out forwards;
        }

        /* 顶部全局容器 */
        .wrap {
            max-width: 680px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        /* 主标题 */
        .main-title {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-primary);
            margin-bottom: 60px;
            animation-delay: 0.1s;
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.4);
        }

        /* 分割模块 */
        .section {
            margin-bottom: 64px;
            animation-delay: 0.2s;
        }

        /* 模块小标题 */
        .sub-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            border-left: 3px solid var(--theme);
            padding-left: 16px;
        }

        /* 应用介绍正文 */
        .desc {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 2;
        }

        /* 功能模块 玻璃卡片 */
        .func-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-top: 32px;
        }

        .func-item {
            padding: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount)) saturate(var(--saturate-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(var(--saturate-amount));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            transition: all 0.35s ease;
            box-shadow: var(--glass-shadow);
        }

        .func-item:hover {
            background: var(--glass-bg-hover);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-6px);
        }

        .func-item h4 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .func-item p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 作者信息 玻璃卡片 */
        .author-box {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 28px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount)) saturate(var(--saturate-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(var(--saturate-amount));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            margin-top: 12px;
            box-shadow: var(--glass-shadow);
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            animation-delay: 0.4s;
        }

        .author-text h4 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .author-text p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 底部页脚 */
        footer {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 24px 60px;
            border-top: 1px solid var(--glass-border);
            text-align: center;
        }

        .footer-link a {
            font-size: 15px;
            color: var(--theme);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-link a:hover {
            color: #0ea572;
            text-decoration: underline;
        }

        .copyright {
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* 手机端自适应 */
        @media (max-width: 520px) {
            .func-grid {
                grid-template-columns: 1fr;
            }
            .main-title {
                font-size: 32px;
            }
        }

        /* 浅色文字模式 */
        .body-text-light {
            --text-primary: #f0f0f0;
            --text-secondary: #c0b8b0;
            --text-muted: #a0988d;
        }
    </style>
</head>
<body>
    <!-- 背景层（同步主页背景） -->
    <div class="bg-blur-layer" id="bgBlurLayer"></div>

    <div class="wrap">
        <!-- 主标题 -->
        <h1 class="main-title animate-fade">关于 Flicer</h1>

        <!-- 应用介绍模块 -->
        <div class="section animate-fade">
            <h2 class="sub-title">应用简介</h2>
            <p class="desc">
                Flicer 是一款轻量工具箱，界面极简无广告。依托高性能 API 实现强大能力，已部署于 GitHub 可通过链接直接访问，全浏览器内核、全设备完美适配。
            </p>

            <!-- 功能网格 -->
            <div class="func-grid">
                <div class="func-item">
                    <h4>进制转换器</h4>
                    <p>支持多进制快速换算，简洁高效实用。</p>
                </div>
                <div class="func-item">
                    <h4>AI 智能工具</h4>
                    <p>集成 AI 绘画与智能对话一体化能力。</p>
                </div>
                <div class="func-item">
                    <h4>休闲娱乐工具</h4>
                    <p>随机萌宠推送，随时收获治愈瞬间。</p>
                </div>
                <div class="func-item">
                    <h4>实用小工具</h4>
                    <p>随机选择器等效率工具合集。</p>
                </div>
            </div>
        </div>

        <!-- 作者模块 -->
        <div class="section animate-fade">
            <h2 class="sub-title">开发作者</h2>
            <div class="author-box">
                <img src="sc.png" alt="作者头像" class="avatar animate-fade" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23e8e4dd%22/%3E%3Ccircle cx=%2250%22 cy=%2238%22 r=%2216%22 fill=%22%23c0b8b0%22/%3E%3Cellipse cx=%2250%22 cy=%2275%22 rx=%2230%22 ry=%2220%22 fill=%22%23c0b8b0%22/%3E%3C/svg%3E'">
                <div class="author-text">
                    <h4>Druiy</h4>
                    <p>不畏将来，不念过去</p>
                    <p>2025.11.18</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部版权 -->
    <footer>
        <div class="footer-link">
            <a href="https://space.bilibili.com/1303008251?spm_id_from=333.1007.0.0" target="_blank">点我前往作者的B站主页</a>
        </div>
        <div class="copyright">© 2025-2026, Druiy Studio. All rights reserved.</div>
    </footer>

    <script>
        // ========== 同步主页全部样式设置 ==========
        const bgBlurLayer = document.getElementById('bgBlurLayer');

        const bgPresets = {
            default: 'linear-gradient(155deg, #ece7df 0%, #f4f0ea 20%, #efeae3 45%, #f7f3ed 70%, #e8e3da 100%)',
            sunrise: 'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
            ocean: 'linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%)',
            lavender: 'linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%)'
        };

        function applySharedSettings() {
            // 1. 主题色
            const themeColor = localStorage.getItem('themeColor') || '#10B981';
            const rgb = hexToRgb(themeColor);
            const glowRgba = `rgba(${rgb.r},${rgb.g},${rgb.b},0.25)`;
            document.documentElement.style.setProperty('--theme', themeColor);
            document.documentElement.style.setProperty('--theme-glow', glowRgba);

            // 2. 玻璃透明度
            const glassOpacity = parseFloat(localStorage.getItem('glassOpacity')) || 10;
            const opacityValue = glassOpacity / 100;
            document.documentElement.style.setProperty('--glass-bg', `rgba(255, 255, 255, ${opacityValue})`);
            document.documentElement.style.setProperty('--glass-bg-hover', `rgba(255, 255, 255, ${opacityValue + 0.12})`);

            // 3. 毛玻璃模糊强度
            const blurAmount = localStorage.getItem('blurAmount') || '22';
            document.documentElement.style.setProperty('--blur-amount', blurAmount + 'px');

            // 4. 背景模糊
            const bgBlurAmount = localStorage.getItem('bgBlurAmount') || '0';
            document.documentElement.style.setProperty('--bg-blur', bgBlurAmount + 'px');

            // 5. 背景图像
            const bgType = localStorage.getItem('customBgType') || 'default';
            const bgValue = localStorage.getItem('customBgValue') || 'default';
            if (bgType === 'image' && bgValue) {
                bgBlurLayer.style.backgroundImage = `url(${bgValue})`;
                bgBlurLayer.style.backgroundSize = 'cover';
                bgBlurLayer.style.backgroundPosition = 'center';
                bgBlurLayer.style.backgroundAttachment = 'fixed';
                document.body.style.background = '';
            } else if (bgType === 'preset' && bgPresets[bgValue]) {
                bgBlurLayer.style.backgroundImage = bgPresets[bgValue];
                bgBlurLayer.style.backgroundSize = 'cover';
                bgBlurLayer.style.backgroundPosition = 'center';
                bgBlurLayer.style.backgroundAttachment = 'fixed';
                document.body.style.background = '';
            } else {
                bgBlurLayer.style.backgroundImage = bgPresets['default'];
                bgBlurLayer.style.backgroundSize = 'cover';
                bgBlurLayer.style.backgroundPosition = 'center';
                bgBlurLayer.style.backgroundAttachment = 'fixed';
                document.body.style.background = '';
            }

            // 6. 字体颜色
            applyTextColor();
        }

        function applyTextColor() {
            const textColorMode = localStorage.getItem('textColorMode') || 'auto';
            const customTextColor = localStorage.getItem('customTextColor');
            const body = document.body;
            body.classList.remove('body-text-light');

            if (customTextColor) {
                // 自定义颜色直接覆盖
                document.documentElement.style.setProperty('--text-primary', customTextColor);
                document.documentElement.style.setProperty('--text-secondary', customTextColor);
                document.documentElement.style.setProperty('--text-muted', customTextColor);
            } else if (textColorMode === 'light') {
                // 强制浅色
                body.classList.add('body-text-light');
            } else if (textColorMode === 'auto') {
                // 自动根据背景亮度
                const isDarkBg = localStorage.getItem('customBgIsDark') === '1';
                if (isDarkBg) {
                    body.classList.add('body-text-light');
                } else {
                    // 恢复默认深色
                    document.documentElement.style.setProperty('--text-primary', '#111827');
                    document.documentElement.style.setProperty('--text-secondary', '#4b5563');
                    document.documentElement.style.setProperty('--text-muted', '#6b7280');
                }
            } else {
                // dark 模式
                document.documentElement.style.setProperty('--text-primary', '#111827');
                document.documentElement.style.setProperty('--text-secondary', '#4b5563');
                document.documentElement.style.setProperty('--text-muted', '#6b7280');
            }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 16, g: 185, b: 129 };
        }

        applySharedSettings();
    </script>
</body>
</html>
