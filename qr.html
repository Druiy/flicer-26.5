<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>二维码生成器</title>
    <style>
        :root {
            --theme: #10B981;
            --theme-glow: rgba(16, 185, 129, 0.25);
            --glass-bg: rgba(255, 255, 255, 0.10);
            --glass-bg-hover: rgba(255, 255, 255, 0.25);
            --glass-bg-active: rgba(255, 255, 255, 0.38);
            --glass-border: rgba(255, 255, 255, 0.28);
            --glass-border-hover: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 2px 16px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(255, 255, 255, 0.15) inset, 0 1px 0 rgba(255, 255, 255, 0.4) inset;
            --glass-shadow-hover: 0 10px 34px rgba(0, 0, 0, 0.07), 0 0 0 1px rgba(255, 255, 255, 0.25) inset, 0 1px 0 rgba(255, 255, 255, 0.5) inset;
            --radius: 18px;
            --radius-lg: 22px;
            --transition: 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            --blur-amount: 20px;
            --saturate-amount: 150%;
            --text-primary: #1a1a1a;
            --text-secondary: #5c544a;
            --text-muted: #9a9085;
            --input-bg: rgba(255, 255, 255, 0.15);
            --bg-blur: 0px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            background: linear-gradient(155deg, #ece7df 0%, #f4f0ea 20%, #efeae3 45%, #f7f3ed 70%, #e8e3da 100%);
            background-attachment: fixed;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
        }

        /* 背景层（用于显示自定义背景和模糊） */
        .bg-blur-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(var(--bg-blur));
            transition: filter 0.3s ease;
        }

        /* 动态光斑背景 */
        body::before {
            content: '';
            position: fixed;
            top: -28%;
            left: -18%;
            width: 68vw;
            height: 68vw;
            max-width: 560px;
            max-height: 560px;
            background: radial-gradient(circle at 40% 35%, var(--theme-glow) 0%, transparent 72%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: ambientGlow1 10s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -22%;
            right: -16%;
            width: 56vw;
            height: 56vw;
            max-width: 460px;
            max-height: 460px;
            background: radial-gradient(circle at 55% 60%, rgba(139, 92, 246, 0.12) 0%, transparent 68%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: ambientGlow2 13s ease-in-out infinite;
        }
        @keyframes ambientGlow1 {
            0%,100% { transform: translate(0,0) scale(1); opacity:0.65; }
            33% { transform: translate(50px,-30px) scale(1.16); opacity:0.88; }
            66% { transform: translate(-28px,22px) scale(0.86); opacity:0.48; }
        }
        @keyframes ambientGlow2 {
            0%,100% { transform: translate(0,0) scale(1); opacity:0.48; }
            40% { transform: translate(-40px,28px) scale(1.2); opacity:0.72; }
            75% { transform: translate(22px,-18px) scale(0.82); opacity:0.35; }
        }

        /* 主卡片 */
        .wrap {
            width: 100%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount)) saturate(var(--saturate-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(var(--saturate-amount));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 32px 22px 28px;
            box-shadow: var(--glass-shadow);
            position: relative;
            z-index: 2;
            animation: fadeUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(16px);
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        h2 { text-align: center; color: var(--text-primary); margin-bottom: 24px; font-weight: 700; font-size: 1.5rem; letter-spacing: -0.02em; text-shadow: 0 1px 3px rgba(255,255,255,0.4); }
        .item { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.02em; }
        input, select { width: 100%; padding: 12px 14px; border: 1px solid var(--glass-border); border-radius: var(--radius); background: var(--input-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); font-size: 0.93rem; color: var(--text-primary); outline: none; transition: all var(--transition); box-shadow: inset 0 1px 3px rgba(0,0,0,0.03); appearance: none; -webkit-appearance: none; }
        select { background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%235c544a' stroke-width='2.5'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 14px center; padding-right: 36px; cursor: pointer; }
        input:focus, select:focus { border-color: var(--glass-border-hover); box-shadow: 0 0 0 4px var(--theme-glow), inset 0 1px 3px rgba(0,0,0,0.03); background: var(--glass-bg-hover); }

        .btn-gen { width: 100%; padding: 13px; background: var(--theme); border: 1px solid var(--theme); color: #fff; border-radius: var(--radius); font-size: 0.95rem; font-weight: 600; letter-spacing: 0.02em; cursor: pointer; margin-bottom: 20px; transition: all var(--transition); box-shadow: var(--glass-shadow); text-shadow: 0 1px 2px rgba(0,0,0,0.15); }
        .btn-gen:hover { background: #0ea572; border-color: #0ea572; box-shadow: var(--glass-shadow-hover), 0 0 18px var(--theme-glow); transform: translateY(-1px); }
        .btn-gen:active { transform: scale(0.97); transition: transform 0.1s; }

        .preview { background: var(--glass-bg); backdrop-filter: blur(14px) saturate(130%); -webkit-backdrop-filter: blur(14px) saturate(130%); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 22px 18px 20px; text-align: center; box-shadow: var(--glass-shadow); }
        .preview-tit { font-size: 0.82rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 14px; letter-spacing: 0.02em; }
        #qrcode { display: flex; justify-content: center; align-items: center; min-height: 100px; }
        #qrcode img { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .btn-down { margin-top: 16px; padding: 10px 24px; background: var(--glass-bg); backdrop-filter: blur(12px) saturate(140%); -webkit-backdrop-filter: blur(12px) saturate(140%); border: 1px solid var(--glass-border); color: var(--text-primary); border-radius: 24px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all var(--transition); box-shadow: var(--glass-shadow); display: none; letter-spacing: 0.02em; }
        .btn-down:hover { background: var(--glass-bg-hover); border-color: var(--glass-border-hover); box-shadow: var(--glass-shadow-hover); }
        .btn-down:active { transform: scale(0.94); background: var(--glass-bg-active); transition: transform 0.1s; }

        @media (max-width: 420px) { .wrap { padding: 24px 16px 20px; border-radius: var(--radius); } h2 { font-size: 1.3rem; } input, select { padding: 10px 12px; } .btn-gen { padding: 11px; font-size: 0.9rem; } }

        /* 浅色文字模式 */
        .body-text-light {
            --text-primary: #f0f0f0;
            --text-secondary: #c0b8b0;
            --text-muted: #a0988d;
        }
    </style>
</head>
<body>
    <!-- 背景层（同步主页背景） -->
    <div class="bg-blur-layer" id="bgBlurLayer"></div>

    <div class="wrap">
        <h2>二维码生成器</h2>
        <div class="item"><label for="content">输入内容</label><input type="text" id="content" placeholder="输入文字或网址" value="https://"></div>
        <div class="item"><label for="size">二维码尺寸</label><select id="size"><option value="200">200 × 200</option><option value="300" selected>300 × 300</option><option value="400">400 × 400</option></select></div>
        <button class="btn-gen" id="generate">立即生成</button>
        <div class="preview"><div class="preview-tit">二维码预览</div><div id="qrcode"></div><button class="btn-down" id="download">下载图片</button></div>
    </div>

    <script>
        const contentInp = document.getElementById('content');
        const sizeSel = document.getElementById('size');
        const qrBox = document.getElementById('qrcode');
        const downBtn = document.getElementById('download');
        let qrImg = null;

        function generateQR() {
            const text = contentInp.value.trim();
            if (!text) {
                const toast = document.createElement('div');
                toast.textContent = '请输入内容';
                Object.assign(toast.style, { position:'fixed',top:'30px',left:'50%',transform:'translateX(-50%)',background:'rgba(30,30,35,0.75)',backdropFilter:'blur(18px)',WebkitBackdropFilter:'blur(18px)',color:'#f0f0f0',padding:'12px 24px',borderRadius:'24px',fontSize:'0.88rem',fontWeight:'500',zIndex:'9999',boxShadow:'0 8px 24px rgba(0,0,0,0.15)',letterSpacing:'0.02em',opacity:'0',transition:'opacity 0.3s ease' });
                document.body.appendChild(toast);
                requestAnimationFrame(() => { toast.style.opacity = '1'; });
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
                return;
            }
            const size = sizeSel.value;
            const url = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}`;
            qrBox.innerHTML = '';
            qrImg = new Image();
            qrImg.src = url;
            qrImg.alt = "二维码";
            qrImg.style.opacity = '0';
            qrImg.style.transition = 'opacity 0.4s ease';
            qrBox.appendChild(qrImg);
            qrImg.onload = () => { qrImg.style.opacity = '1'; };
            downBtn.style.display = 'inline-block';
        }

        downBtn.onclick = function() { if (!qrImg) return; const a = document.createElement('a'); a.href = qrImg.src; a.download = '二维码.png'; a.click(); };
        document.getElementById('generate').onclick = generateQR;
        window.onload = generateQR;

        // ========== 同步主页全部样式设置 ==========
        const bgBlurLayer = document.getElementById('bgBlurLayer');
        const bgPresets = {
            default: 'linear-gradient(155deg, #ece7df 0%, #f4f0ea 20%, #efeae3 45%, #f7f3ed 70%, #e8e3da 100%)',
            sunrise: 'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
            ocean: 'linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%)',
            lavender: 'linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%)'
        };

        function applySharedSettings() {
            const themeColor = localStorage.getItem('themeColor') || '#10B981';
            const rgb = hexToRgb(themeColor);
            document.documentElement.style.setProperty('--theme', themeColor);
            document.documentElement.style.setProperty('--theme-glow', `rgba(${rgb.r},${rgb.g},${rgb.b},0.25)`);

            const glassOpacity = parseFloat(localStorage.getItem('glassOpacity')) || 10;
            const opacityValue = glassOpacity / 100;
            document.documentElement.style.setProperty('--glass-bg', `rgba(255, 255, 255, ${opacityValue})`);
            document.documentElement.style.setProperty('--glass-bg-hover', `rgba(255, 255, 255, ${opacityValue + 0.15})`);
            document.documentElement.style.setProperty('--glass-bg-active', `rgba(255, 255, 255, ${opacityValue + 0.28})`);
            document.documentElement.style.setProperty('--input-bg', `rgba(255, 255, 255, ${opacityValue + 0.05})`);

            const blurAmount = localStorage.getItem('blurAmount') || '20';
            document.documentElement.style.setProperty('--blur-amount', blurAmount + 'px');

            const bgBlurAmount = localStorage.getItem('bgBlurAmount') || '0';
            document.documentElement.style.setProperty('--bg-blur', bgBlurAmount + 'px');

            const bgType = localStorage.getItem('customBgType') || 'default';
            const bgValue = localStorage.getItem('customBgValue') || 'default';
            if (bgType === 'image' && bgValue) {
                bgBlurLayer.style.backgroundImage = `url(${bgValue})`;
                bgBlurLayer.style.backgroundSize = 'cover';
                bgBlurLayer.style.backgroundPosition = 'center';
                bgBlurLayer.style.backgroundAttachment = 'fixed';
                document.body.style.background = '';
            } else if (bgType === 'preset' && bgPresets[bgValue]) {
                bgBlurLayer.style.backgroundImage = bgPresets[bgValue];
                bgBlurLayer.style.backgroundSize = 'cover';
                bgBlurLayer.style.backgroundPosition = 'center';
                bgBlurLayer.style.backgroundAttachment = 'fixed';
                document.body.style.background = '';
            } else {
                bgBlurLayer.style.backgroundImage = bgPresets['default'];
                bgBlurLayer.style.backgroundSize = 'cover';
                bgBlurLayer.style.backgroundPosition = 'center';
                bgBlurLayer.style.backgroundAttachment = 'fixed';
                document.body.style.background = '';
            }

            applyTextColor();
        }

        function applyTextColor() {
            const textColorMode = localStorage.getItem('textColorMode') || 'auto';
            const customTextColor = localStorage.getItem('customTextColor');
            const body = document.body;
            body.classList.remove('body-text-light');
            if (customTextColor) {
                document.documentElement.style.setProperty('--text-primary', customTextColor);
                document.documentElement.style.setProperty('--text-secondary', customTextColor);
                document.documentElement.style.setProperty('--text-muted', customTextColor);
            } else if (textColorMode === 'light') {
                body.classList.add('body-text-light');
            } else if (textColorMode === 'auto') {
                if (localStorage.getItem('customBgIsDark') === '1') body.classList.add('body-text-light');
                else {
                    document.documentElement.style.setProperty('--text-primary', '#1a1a1a');
                    document.documentElement.style.setProperty('--text-secondary', '#5c544a');
                    document.documentElement.style.setProperty('--text-muted', '#9a9085');
                }
            } else {
                document.documentElement.style.setProperty('--text-primary', '#1a1a1a');
                document.documentElement.style.setProperty('--text-secondary', '#5c544a');
                document.documentElement.style.setProperty('--text-muted', '#9a9085');
            }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1],16), g: parseInt(result[2],16), b: parseInt(result[3],16) } : { r:16,g:185,b:129 };
        }

        applySharedSettings();
    </script>
</body>
</html>
